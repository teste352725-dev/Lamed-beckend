<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Admin | Seja Profeta</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <style>
    body { background: #fdfcf9; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
  <div class="w-full max-w-md bg-white border border-[#E5E0D8] shadow-sm p-8 rounded-2xl">
    <div class="text-center mb-8">
      <p class="text-xs uppercase tracking-[3px] text-[#d4af37]">Área Administrativa</p>
      <h1 class="text-3xl italic font-serif text-[#1a110a]">Seja Profeta</h1>
      <p class="text-xs text-gray-500 mt-2">Acesso para gestão da loja de velas</p>
    </div>

    <form id="login-form" class="space-y-4">
      <div>
        <label class="text-xs uppercase tracking-widest text-gray-500">E-mail</label>
        <input id="email" type="email" required class="mt-1 w-full border border-gray-200 px-3 py-2 rounded-lg outline-none focus:border-[#d4af37]" placeholder="admin@sejaprofeta.com">
      </div>
      <div>
        <label class="text-xs uppercase tracking-widest text-gray-500">Senha</label>
        <input id="password" type="password" required class="mt-1 w-full border border-gray-200 px-3 py-2 rounded-lg outline-none focus:border-[#d4af37]" placeholder="********">
      </div>
      <button id="submit-btn" type="submit" class="w-full bg-[#1a110a] text-white py-3 rounded-lg uppercase text-xs tracking-[2px] hover:bg-[#643f21] transition">
        Entrar no Painel
      </button>
      <p id="error" class="text-sm text-red-600 hidden"></p>
    </form>

    <a href="index.html" class="block text-center text-xs text-gray-400 mt-6 hover:text-[#d4af37]">← Voltar para a loja</a>
  </div>

  <script src="admin-common.js"></script>
  <script>
    auth.onAuthStateChanged((user) => {
      if (user && isAdminUser(user)) {
        window.location.href = 'dashboard.html';
      }
    });

    const form = document.getElementById('login-form');
    const error = document.getElementById('error');
    const btn = document.getElementById('submit-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      error.classList.add('hidden');
      btn.disabled = true;
      btn.textContent = 'Entrando...';

      try {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const cred = await auth.signInWithEmailAndPassword(email, password);

        if (!isAdminUser(cred.user)) {
          await auth.signOut();
          throw new Error('Usuário autenticado, mas sem permissão de administrador.');
        }

        window.location.href = 'dashboard.html';
      } catch (err) {
        error.textContent = err.message || 'Erro ao autenticar.';
        error.classList.remove('hidden');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Entrar no Painel';
      }
    });
  </script>
</body>
</html>
